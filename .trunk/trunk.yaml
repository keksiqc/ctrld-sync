# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  enabled:
    - trufflehog-git@3.90.13
    - actionlint@1.7.12
    - bandit@1.9.4
    - black@26.5.1
    - checkov@3.2.529
    - git-diff-check
    - hadolint@2.14.0
    - isort@8.0.1
    - markdownlint@0.48.0
    - mypy@2.1.0
    - osv-scanner@2.3.5
    - prettier@3.8.3
    - ruff@0.15.13
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - taplo@0.10.0
    - terrascan@1.19.9
    - trivy@0.69.3
    - trufflehog@3.95.2
    - yamllint@1.38.0
actions:
  disabled:
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - git-lfs
    - npm-check
    - poetry-install
    - submodule-init-update
    - trunk-check-pre-commit
    - trunk-check-pre-push-always
    - npm-check-pre-push
    - uv-check
    - uv-lock
    - uv-sync
    - yarn-check
    - poetry-lock
    - poetry-export
    - poetry-check
  enabled:
    - trufflehog-pre-commit
    - git-blame-ignore-revs
    - trunk-announce
    - trunk-upgrade-available
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
